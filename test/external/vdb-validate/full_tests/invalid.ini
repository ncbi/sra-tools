product = test

run = START FLAT DB CSRA RM

FLAT = RM F1 TEST RM F2 TEST RM F3 TEST RM F4 TEST
DB   = RM D1 TEST RM D2 TEST RM D3 TEST RM D4 TEST

#CSRA = RM C1 TEST RM C2 TEST RM C3 TEST RM C4 TEST RM C5 TEST
CSRA = RM C5 TEST

ACC : INVALID_ACC

START.exe = :echo detecting invalid accessions

#remove a potentially existing accesson
RM.exe = :rm ${ACC}
RM.cap = remove ${ACC} accession
RM.ignore = yes

#running vdb-validate on an accession
TEST.exe = vdb-validate ${ACC} -B -I -C yes -x
TEST.cap = executing vdb-validate ${ACC} -B yes -I yes -C yes -x
TEST.stdout = -
TEST.stderr = -
TEST.expected = 3

#-------------------------------------------------------------------
#length of QUALITY has been reduced for mismatch
F1.exe = :run ../SOURCES/flat_bad_qual.ini ${ACC}
F1.cap = create ${ACC} (flat) with len(READ) <> len(QUALITY)

#length of READ has been reduced for mismatch
F2.exe = :run ../SOURCES/flat_bad_read.ini ${ACC}
F2.cap = create ${ACC} (flat) with len(QUALITY) <> len(READ)

#READ_START has been increased to point past end of READ
F3.exe = :run ../SOURCES/flat_bad_rd_start.ini ${ACC}
F3.cap = create ${ACC} (flat) with invalid READ_START

#READ_LEN has been increased to point past end of READ
F4.exe = :run ../SOURCES/flat_bad_rd_len.ini ${ACC}
F4.cap = create ${ACC} (flat) with invalid READ_LEN

#-------------------------------------------------------------------
#length of QUALITY has been reduced for mismatch
D1.exe = :run ../SOURCES/db_bad_qual.ini ${ACC}
D1.cap = create ${ACC} (db) with len(READ) <> len(QUALITY) V1

#length of READ has been reduced for mismatch
D2.exe = :run ../SOURCES/db_bad_read.ini ${ACC}
D2.cap = create ${ACC} (db) with len(READ) <> len(QUALITY) V2

#READ_START has been increased to point past end of READ
D3.exe = :run ../SOURCES/db_bad_rd_start.ini ${ACC}
D3.cap = create ${ACC} (db) with invalid READ_START

#READ_LEN has been increased to point past end of READ
D4.exe = :run ../SOURCES/db_bad_rd_len.ini ${ACC}
D4.cap = create ${ACC} (db) with invalid READ_LEN

#-------------------------------------------------------------------
#length of QUALITY has been reduced for mismatch
C1.exe = :run ../SOURCES/csra_bad_qual.ini ${ACC}
C1.cap = create ${ACC} (csra) with len(READ) <> len(QUALITY) V1

#length of READ has been reduced for mismatch
C2.exe = :run ../SOURCES/csra_bad_read.ini ${ACC}
C2.cap = create ${ACC} (csra) with len(READ) <> len(QUALITY) V2

#READ_START has been increased to point past end of READ
C3.exe = :run ../SOURCES/csra_bad_rd_start.ini ${ACC}
C3.cap = create ${ACC} (csra) with invalid READ_START

#READ_LEN has been increased to point past end of READ
C4.exe = :run ../SOURCES/csra_bad_rd_len.ini ${ACC}
C4.cap = create ${ACC} (csra) with invalid READ_LEN

#referential integrity has been invalidate
C5.exe = :run ../SOURCES/csra_bad_ref_int.ini ${ACC}
C5.cap = create ${ACC} (csra) with invalid ref-integrity

