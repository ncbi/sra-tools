product = test

run = START FLAT DB CSRA RM

FLAT = RM F1 TEST RM F2 TEST RM F3 TEST RM F4 TEST
DB   = RM D1 TEST RM D2 TEST RM D3 TEST RM D4 TEST
CSRA = RM C1 TEST RM C2 TEST RM C3 TEST RM C4 TEST

START.exe = :echo detecting invalid accessions

RM.exe = :rm INVALID *.fastq *.fasta
RM.cap = remove INVALID accession
RM.ignore = yes

TEST.exe = fasterq-dump INVALID
TEST.cap = executing fasterq-dump - expecting return-code 3
TEST.expected = 3

#-------------------------------------------------------------------
F1.exe = :run ../SOURCES/flat_bad_qual.ini INVALID
F1.cap = create INVALID (flat) with len(READ) <> len(QUALITY)

F2.exe = :run ../SOURCES/flat_bad_read.ini INVALID
F2.cap = create INVALID (flat) with len(QUALITY) <> len(READ)

F3.exe = :run ../SOURCES/flat_bad_rd_start.ini INVALID
F3.cap = create INVALID (flat) with invalid READ_START

F4.exe = :run ../SOURCES/flat_bad_rd_len.ini INVALID
F4.cap = create INVALID (flat) with invalid READ_LEN

#-------------------------------------------------------------------
D1.exe = :run ../SOURCES/db_bad_qual.ini INVALID
D1.cap = create INVALID (db) with len(READ) <> len(QUALITY) V1

D2.exe = :run ../SOURCES/db_bad_read.ini INVALID
D2.cap = create INVALID (db) with len(READ) <> len(QUALITY) V2

D3.exe = :run ../SOURCES/db_bad_rd_start.ini INVALID
D3.cap = create INVALID (db) with invalid READ_START

D4.exe = :run ../SOURCES/db_bad_rd_len.ini INVALID
D4.cap = create INVALID (db) with invalid READ_LEN

#-------------------------------------------------------------------
C1.exe = :run ../SOURCES/csra_bad_qual.ini INVALID
C1.cap = create INVALID (csra) with len(READ) <> len(QUALITY) V1

C2.exe = :run ../SOURCES/csra_bad_read.ini INVALID
C2.cap = create INVALID (csra) with len(READ) <> len(QUALITY) V2

C3.exe = :run ../SOURCES/csra_bad_rd_start.ini INVALID
C3.cap = create INVALID (csra) with invalid READ_START

C4.exe = :run ../SOURCES/csra_bad_rd_len.ini INVALID
C4.cap = create INVALID (csra) with invalid READ_LEN
