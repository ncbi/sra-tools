product = test

#including sra-convert
#run = REMOVE FASTQ-DUMP FASTERQ-DUMP FASTQ-VS-FASTERQ SRA-CONVERT-1 SRA-CONVERT-2 REMOVE

#excluding sra-convert
run = REMOVE FASTQ-DUMP FASTERQ-DUMP FASTQ-VS-FASTERQ REMOVE

FASTQ-DUMP = FASTQ-DUMP-R FASTQ-DUMP-M1 FASTQ-DUMP-M2
FASTERQ-DUMP = FASTERQ-DUMP-R FASTERQ-DUMP-M1 FASTERQ-DUMP-M2 FASTERQ-DUMP-N
FASTQ-VS-FASTERQ = FASTQ-VS-FASTERQ-1 FASTQ-VS-FASTERQ-2
SRA-CONVERT-1 = SRA-CONVERT-R1 SRA-CONVERT-N1 SRA-CONVERT-D1A SRA-CONVERT-D1B
SRA-CONVERT-2 = SRA-CONVERT-R2 SRA-CONVERT-N2 SRA-CONVERT-D2A SRA-CONVERT-D2B

REMOVE.exe    = :rm *.$EXT OUTF
REMOVE.cap    = remove all $EXT-files
REMOVE.ignore = yes

#----------------------------------------------------------------------
FASTQ-DUMP-R.exe    = fastq-dump ${FMT1A} ${FMT1B} --split-files --skip-technical ${ACC}
FASTQ-DUMP-R.cap    = fastq-dump ${FMT1A} ${FMT1B} --split-files --skip-technical ${ACC}

FASTQ-DUMP-M1.exe   = :mv $ACC A .$EXT _1 _2 _3 _4
FASTQ-DUMP-M1.cap   = :mv $ACC A .$EXT _1 _2 _3 _4
FASTQ-DUMP-M1.ignore = yes

FASTQ-DUMP-M2.exe   = :mv $ACC.$EXT A.$EXT
FASTQ-DUMP-M2.cap   = :mv $ACC.$EXT A.$EXT
FASTQ-DUMP-M2.ignore = yes

#----------------------------------------------------------------------
FASTERQ-DUMP-R.exe    = fasterq-dump ${ACC} ${FMT1A} --split-files --skip-technical
FASTERQ-DUMP-R.cap    = fasterq-dump ${ACC} ${FMT1A} --split-files --skip-technical

FASTERQ-DUMP-M1.exe   = :mv $ACC B .$EXT _1 _2 _3 _4
FASTERQ-DUMP-M1.cap   = :mv $ACC B .$EXT _1 _2 _3 _4
FASTERQ-DUMP-M1.ignore = yes

FASTERQ-DUMP-M2.exe   = :mv $ACC.$EXT B.$EXT
FASTERQ-DUMP-M2.cap   = :mv $ACC.$EXT B.$EXT
FASTERQ-DUMP-M2.ignore = yes

FASTERQ-DUMP-N.exe    = :norm A B $EXT
FASTERQ-DUMP-N.cap    = normalize A and B

#----------------------------------------------------------------------
FASTQ-VS-FASTERQ-1.exe    = :diff A B .$EXT _1 _2 _3 _4
FASTQ-VS-FASTERQ-1.cap    = :diff A B .$EXT _1 _2 _3 _4
FASTQ-VS-FASTERQ-1.ignore = yes

FASTQ-VS-FASTERQ-2.exe    = :diff A.$EXT B.$EXT
FASTQ-VS-FASTERQ-2.cap    = :diff A.$EXT B.$EXT
FASTQ-VS-FASTERQ-2.ignore = yes

#----------------------------------------------------------------------
SRA-CONVERT-R1.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split FILES --tech SKIP --mode FILES
SRA-CONVERT-R1.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split FILES --tech SKIP --mode FILES

SRA-CONVERT-N1.exe    = :norm B $ACC $EXT
SRA-CONVERT-N1.cap    = normalize B and $ACC

SRA-CONVERT-D1A.exe    = :diff B $ACC .$EXT _1 _2 _3 _4
SRA-CONVERT-D1A.cap    = :diff B $ACC .$EXT _1 _2 _3 _4
SRA-CONVERT-D1A.ignore = yes

SRA-CONVERT-D1B.exe    = :diff B.$EXT $ACC.$EXT
SRA-CONVERT-D1B.cap    = :diff B.$EXT $ACC.$EXT
SRA-CONVERT-D1B.ignore = yes

#----------------------------------------------------------------------
SRA-CONVERT-R2.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split FILES --tech SKIP --mode FILES -o out.$EXT
SRA-CONVERT-R2.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split FILES --tech SKIP --mode FILES -o out.$EXT

SRA-CONVERT-N2.exe    = :norm B out $EXT
SRA-CONVERT-N2.cap    = normalize B and out

SRA-CONVERT-D2A.exe    = :diff B out .$EXT _1 _2 _3 _4
SRA-CONVERT-D2A.cap    = :diff B out .$EXT _1 _2 _3 _4
SRA-CONVERT-D2A.ignore = yes

SRA-CONVERT-D2B.exe    = :diff B.$EXT out.$EXT
SRA-CONVERT-D2B.cap    = :diff B.$EXT out.$EXT
SRA-CONVERT-D2B.ignore = yes
