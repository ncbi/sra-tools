product = test

#including sra-convert
#run = REMOVE FASTQ-DUMP FASTQ-DUMP-MOVE FASTERQ-DUMP FASTERQ-DUMP-MOVE SRA-CONVERT FASTQ-VS-FASTERQ FASTERQ-VS-CONVERT REMOVE

#excluding sra-convert
run = REMOVE FASTQ-DUMP FASTQ-DUMP-MOVE FASTERQ-DUMP FASTERQ-DUMP-MOVE FASTQ-VS-FASTERQ REMOVE

DEFSEQ  : '@$ac.$si/$ri [$sn ]length=$rl'
DEFQUAL : '+$ac.$si/$ri [$sn ]length=$rl'

REMOVE.exe    = :rm *.$EXT OUTF
REMOVE.cap    = remove all $EXT-files
REMOVE.ignore = yes

FASTQ-DUMP.exe    = fastq-dump ${FMT1A} ${FMT1B} --split-spot --defline-seq $DEFSEQ --defline-qual $DEFQUAL ${ACC}
FASTQ-DUMP.cap    = fastq-dump ${FMT1A} ${FMT1B} --split-spot --defline-seq $DEFSEQ --defline-qual $DEFQUAL ${ACC}

FASTQ-DUMP-MOVE.exe   = :mv $ACC.$EXT A.$EXT
FASTQ-DUMP-MOVE.cap   = :mv $ACC.$EXT A.$EXT

FASTERQ-DUMP.exe    = fasterq-dump ${ACC} ${FMT1A} --split-spot --include-technical
FASTERQ-DUMP.cap    = fasterq-dump ${ACC} ${FMT1A} --split-spot --include-technical

FASTERQ-DUMP-MOVE.exe   = :mv $ACC.$EXT B.$EXT
FASTERQ-DUMP-MOVE.cap   = :mv $ACC.$EXT B.$EXT

SRA-CONVERT.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split SPOT --tech INCLUDE --mode FILES
SRA-CONVERT.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split SPOT --tech INCLUDE --mode FILES

FASTQ-VS-FASTERQ.exe    = :diff A.$EXT B.$EXT
FASTQ-VS-FASTERQ.cap    = compare output of fastq-dump vs. fasterq-dump

FASTERQ-VS-CONVERT.exe    = :diff B.$EXT $ACC.$EXT
FASTERQ-VS-CONVERT.cap    = compare output of fasterq-dump vs. sra-convert (1)

