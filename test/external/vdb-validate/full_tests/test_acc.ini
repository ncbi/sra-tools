product = test

run = CREATE VALIDATE1 VALIDATE2 REMOVE

#-----------------------------------------------------------------
CREATE.exe    = :run $SRC ${ACC}
CREATE.cap    = create accession $SRC ---> ${ACC}

#-----------------------------------------------------------------
#run the 12 test-cases against vdb-validate
VALIDATE1.exe    = vdb-validate ${ACC}
VALIDATE1.cap    = validating ${ACC}

VALIDATE2.exe    = vdb-validate ${ACC} -B yes -I yes -C yes -x
VALIDATE2.cap    = validating ${ACC} -B yes -I yes -C yes -x

#-----------------------------------------------------------------
REMOVE.exe    = :rm ${ACC}
REMOVE.cap    = remove accession ${ACC}
REMOVE.ignore = yes
