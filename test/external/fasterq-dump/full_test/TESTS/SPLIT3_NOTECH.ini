product = test

#including sra-convert
#run = REMOVE FASTQ-DUMP FASTQ-DUMP-MOVE FASTERQ-DUMP FASTERQ-DUMP-MOVE FASTQ-VS-FASTERQ T5 T6 T7 T8 REMOVE

#excluding sra-convert
run = REMOVE FASTQ-DUMP FASTQ-DUMP-MOVE FASTERQ-DUMP FASTERQ-DUMP-MOVE FASTQ-VS-FASTERQ REMOVE

REMOVE.exe    = :rm *.$EXT OUTF
REMOVE.cap    = remove all $EXT-files
REMOVE.ignore = yes

FASTQ-DUMP.exe    = fastq-dump ${FMT1A} ${FMT1B} --split-3 ${ACC}
FASTQ-DUMP.cap    = fastq-dump ${FMT1A} ${FMT1B} --split-3 ${ACC}

FASTQ-DUMP-MOVE.exe   = :mv $ACC A .$EXT _1 _2 _3 _4
FASTQ-DUMP-MOVE.cap   = :mv $ACC A .$EXT _1 _2 _3 _4
FASTQ-DUMP-MOVE.ignore = yes

#this one does not work on CSRA_LARGE
FASTERQ-DUMP.exe    = fasterq-dump ${ACC} ${FMT1A} --split-3
FASTERQ-DUMP.cap    = fasterq-dump ${ACC} ${FMT1A} --split-3
FASTERQ-DUMP.excl   = CSRA_LARGE

FASTERQ-DUMP-MOVE.exe   = :mv $ACC B .$EXT _1 _2 _3 _4
FASTERQ-DUMP-MOVE.cap   = :mv $ACC B .$EXT _1 _2 _3 _4
FASTERQ-DUMP-MOVE.ignore = yes
FASTERQ-DUMP-MOVE.excl   = CSRA_LARGE

FASTQ-VS-FASTERQ.exe    = :diff A B .$EXT _1 _2 _3 _4
FASTQ-VS-FASTERQ.cap    = :diff A B .$EXT _1 _2 _3 _4
FASTQ-VS-FASTERQ.ignore = yes
FASTQ-VS-FASTERQ.excl   = CSRA_LARGE

T5.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split FILES3 --tech INCLUDE --mode FILES
T5.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split FILES3 --tech INCLUDE --mode FILES

T6.exe    = :diff A $ACC .$EXT _1 _2 _3 _4
T6.cap    = :diff A $ACC .$EXT _1 _2 _3 _4
T6.ignore = yes

T7.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split FILES3 --tech INCLUDE --mode FILES -o out.$EXT
T7.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split FILES3 --tech INCLUDE --mode FILES -o out.$EXT

T8.exe    = :diff A out .$EXT _1 _2 _3 _4
T8.cap    = :diff A out .$EXT _1 _2 _3 _4
T8.ignore = yes
