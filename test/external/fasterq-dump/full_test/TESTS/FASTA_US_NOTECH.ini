product = test

#excluding sra-convert
#run = REMOVE FASTQ-DUMP FASTQ-DUMP-MOVE FASTERQ-DUMP FASTERQ-DUMP-MOVE FASTQ-VS-FASTERQ REMOVE

run = REMOVE

REMOVE.exe    = :rm *.$EXT OUTF
REMOVE.cap    = remove all $EXT-files
REMOVE.ignore = yes

FASTQ-DUMP.exe    = fastq-dump ${FMT1A} ${FMT1B} --skip-technical ${OUT}${ACC}
FASTQ-DUMP.cap    = fastq-dump ${FMT1A} ${FMT1B} --skip-technical ${OUT}${ACC}

FASTQ-DUMP-MOVE.exe   = :mv $ACC.$EXT A.$EXT
FASTQ-DUMP-MOVE.cap   = :mv $ACC.$EXT A.$EXT

FASTERQ-DUMP.exe    = fasterq-dump ${OUT}${ACC} ${FMT1A} --concatenate-reads --skip-technical
FASTERQ-DUMP.cap    = fasterq-dump ${OUT}${ACC} ${FMT1A} --concatenate-reads --skip-technical

FASTERQ-DUMP-MOVE.exe   = :mv $ACC.$EXT B.$EXT
FASTERQ-DUMP-MOVE.cap   = :mv $ACC.$EXT B.$EXT

FASTQ-VS-FASTERQ.exe    = :diff A.$EXT B.$EXT
FASTQ-VS-FASTERQ.cap    = compare output of fastq-dump vs. fasterq-dump
