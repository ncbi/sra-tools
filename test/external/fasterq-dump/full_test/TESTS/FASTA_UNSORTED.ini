product = test

run = FASTQ FASTERQ FASTQ-VS-FASTERQ DONE

FASTQ = FASTQ-DUMP FASTQ-1L FASTQ-REMOVE1 FASTQ-SORT FASTQ-REMOVE2
FASTERQ = FASTERQ-DUMP FASTERQ-1L FASTERQ-REMOVE1 FASTERQ-SORT FASTERQ-REMOVE2

FMT : '>$ac.$si/$ri $sn length=$rl'

FASTQ-DUMP.exe = fastq-dump --fasta 0 --split-spot --skip-technical --defline-seq ${FMT} -Z ${ACC}
FASTQ-DUMP.cap = fastq-dump --fasta 0 --split-spot --skip-technical --defline-seq ${FMT} -Z ${ACC}
FASTQ-DUMP.stdout = ${ACC}.fastq-dump.fasta
FASTQ-1L.exe = :fasta1l ${ACC}.fastq-dump.fasta ${ACC}.fastq-dump.1l.fasta
FASTQ-REMOVE1.exe = :rm ${ACC}.fastq-dump.fasta
FASTQ-SORT.exe = :sort ${ACC}.fastq-dump.1l.fasta ${ACC}.fastq-dump.1ls.fasta
FASTQ-REMOVE2.exe = :rm ${ACC}.fastq-dump.1l.fasta

FASTERQ-DUMP.exe = fasterq-dump --skip-technical --fasta-unsorted -o ${ACC}.fasterq-dump.fasta ${ACC}
FASTERQ-DUMP.cap = fasterq-dump --skip-technical --fasta-unsorted -o ${ACC}.fasterq-dump.fasta ${ACC}
FASTERQ-1L.exe = :fasta1l ${ACC}.fasterq-dump.fasta ${ACC}.fasterq-dump.1l.fasta
FASTERQ-REMOVE1.exe = :rm ${ACC}.fasterq-dump.fasta
FASTERQ-SORT.exe = :sort ${ACC}.fasterq-dump.1l.fasta ${ACC}.fasterq-dump.1ls.fasta
FASTERQ-REMOVE2.exe = :rm ${ACC}.fasterq-dump.1l.fasta

FASTQ-VS-FASTERQ.exe = :diff ${ACC}.fastq-dump.1ls.fasta ${ACC}.fasterq-dump.1ls.fasta

DONE.exe = :echo FASTA-UNSORTED on ${ACC} ---> SUCCESS!
