product = test

#including SRA-CONVERT
#run = REMOVE FASTQ-DUMP FASTERQ-DUMP SRA-CONVERT FASTQ-VS-FASTERQ FASTERQ-VS-CONVERT REMOVE

#excluding SRA-CONVERT
run = REMOVE FASTQ-DUMP FASTERQ-DUMP FASTQ-VS-FASTERQ REMOVE

REMOVE.exe    = :rm *.$EXT
REMOVE.cap    = remove all fasta-files
REMOVE.ignore = yes

FASTQ-DUMP.exe    = fastq-dump --fasta 0 --skip-technical -Z ${ACC}
FASTQ-DUMP.cap    = fastq-dump --fasta 0 --skip-technical -Z ${ACC}
FASTQ-DUMP.stdout = A.$EXT

#this does not work on CSRA_LARGE.FASTQ
FASTERQ-DUMP.exe    = fasterq-dump ${ACC} --fasta --concatenate-reads --skip-technical -Z
FASTERQ-DUMP.cap    = fasterq-dump }${ACC} --fasta --concatenate-reads --skip-technical -Z
FASTERQ-DUMP.stdout = B.$EXT
FASTERQ-DUMP.excl   = CSRA_LARGE.FASTQ

# run this command, even if we cannot compare its output ( see below )
# at least it should run without producing an error
SRA-CONVERT.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split CONCAT --tech SKIP --mode STDOUT
SRA-CONVERT.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split CONCAT --tech SKIP --mode STDOUT
SRA-CONVERT.stdout = C.$EXT

FASTQ-VS-FASTERQ.exe    = :diff  A.$EXT B.$EXT
FASTQ-VS-FASTERQ.cap    = compare output of fastq-dump vs. fasterq-dump
FASTQ-VS-FASTERQ.excl   = CSRA_LARGE.FASTQ

# this will fail because fastq-dump and fasterq-dump do not support
# skipping technical READS in CONCAT-mode ( the commandline-switch is ignored )
# but sra-convert does support it, leading to the diff failing...
FASTERQ-VS-CONVERT.exe    = :diff B.$EXT C.$EXT
FASTERQ-VS-CONVERT.cap    = compare output of fasterq-dump vs. sra-convert
