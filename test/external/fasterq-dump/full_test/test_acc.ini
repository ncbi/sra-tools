product = test

run = CREATE FASTA FASTQ REMOVE

#-----------------------------------------------------------------
CREATE.exe    = :run $SRC ${ACC}
CREATE.cap    = create accession $SRC ---> ${ACC}

#-----------------------------------------------------------------
#run the 12 test-cases in "test_suite.ini" regarding FASTA
FASTA.exe    = :run test_suite.ini
FASTA.cap    = run suite of tests for FASTA
FASTA.values = EXT:fasta
FASTA.values = FMT:FASTA
FASTA.values = FMT1A:--fasta
FASTA.values = FMT1B:0

#-----------------------------------------------------------------
#run the 12 test-cases in "test_suite.ini" regarding FASTQ
FASTQ.exe    = :run test_suite.ini
FASTQ.cap    = run suite of tests for FASTQ
FASTQ.values = EXT:fastq
FASTQ.values = FMT:FASTQ
FASTQ.values = FMT1A:
FASTQ.values = FMT1B:

#-----------------------------------------------------------------
FASTA_US = FASTA_US1 FASTA_US2

#FASTA-UNSORTED-WITH-TECH
FASTA_US1.exe = :run TESTS/FASTA_US_WTECH.ini
FASTQ_US1.cap = run test regarding FASTA-unsorted with techn.

#FASTA-UNSORTED-NO-TECH
FASTA_US2.exe = :run TESTS/FASTA_US_NOTECH.ini
FASTQ_US2.cap = run test regarding FASTA-unsorted no techn.

#-----------------------------------------------------------------
REMOVE.exe    = :rm ${ACC}
REMOVE.cap    = remove accession ${ACC}
REMOVE.ignore = yes
