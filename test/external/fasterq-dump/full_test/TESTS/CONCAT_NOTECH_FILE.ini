product = test

#including sra-convert
#run = REMOVE FASTQ-DUMP FASTQ-DUMP-MOVE FASTERQ-DUMP FASTERQ-DUMP-MOVE SRA-CONVERT FASTQ-VS-FASTERQ REMOVE

#excluding sra-convert
run = REMOVE FASTQ-DUMP FASTQ-DUMP-MOVE FASTERQ-DUMP FASTERQ-DUMP-MOVE FASTQ-VS-FASTERQ REMOVE

REMOVE.exe    = :rm *.$EXT OUTF
REMOVE.cap    = remove all $EXT-files
REMOVE.ignore = yes

FASTQ-DUMP.exe    = fastq-dump ${FMT1A} ${FMT1B} --skip-technical ${ACC}
FASTQ-DUMP.cap    = fastq-dump ${FMT1A} ${FMT1B} --skip-technical ${ACC}

FASTQ-DUMP-MOVE.exe   = :mv $ACC.$EXT A.$EXT
FASTQ-DUMP-MOVE.cap   = :mv $ACC.$EXT A.$EXT

FASTERQ-DUMP.exe    = fasterq-dump ${ACC} ${FMT1A} --concatenate-reads --skip-technical
FASTERQ-DUMP.cap    = fasterq-dump ${ACC} ${FMT1A} --concatenate-reads --skip-technical

FASTERQ-DUMP-MOVE.exe   = :mv $ACC.$EXT B.$EXT
FASTERQ-DUMP-MOVE.cap   = :mv $ACC.$EXT B.$EXT

# run this command, even if we cannot compare its output ( see below )
# at least it should run without producing an error
SRA-CONVERT.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split CONCAT --tech SKIP --mode FILES
SRA-CONVERT.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split CONCAT --tech SKIP --mode FILES

FASTQ-VS-FASTERQ.exe    = :diff A.$EXT B.$EXT
FASTQ-VS-FASTERQ.cap    = compare output of fastq-dump vs. fasterq-dump

# this will fail because fastq-dump and fasterq-dump do not support
# skipping technical READS in CONCAT-mode ( the commandline-switch is ignored )
# but sra-convert does support it, leading to the diff failing...
FASTERQ-VS-CONVERT.exe    = :diff B.$EXT $ACC.$EXT
FASTERQ-VS-CONVERT.cap    = compare output of fasterq-dump vs. sra-convert
