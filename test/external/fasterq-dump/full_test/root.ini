product = test

run = CD_DIR FLAT DB CSRA UNSORTED INVALID CLEANUP1 CLEANUP2 DONE

#run = CD_DIR INVALID CLEANUP1 CLEANUP2 DONE

FLAT = FLAT_W_NAME FLAT_NO_NAME FLAT_LARGE
DB = DB_W_NAME DB_NO_NAME DB_LARGE
CSRA = CSRA_N CSRA_CMP CSRA_LARGE CSRA_RD1

# values for stdout/stderr:
# empty   ---> pipe > null ( aka no stdout )
# -       ---> pipe > stdout
# --      ---> pipe > stderr
# .:name  ---> pipe > md5 > value
# .name   ---> pipe > md5 > file
# :name   ---> pipe > value
# name    ---> pipe > file

#WORK : WORK

WORK : WORK

CD_DIR.exe = :cd $WORK

FLAT_W_NAME.exe    = :run test_acc.ini
FLAT_W_NAME.cap    = test a flat table with a name column
FLAT_W_NAME.values = SRC:SOURCES/flat_with_name.ini
FLAT_W_NAME.values = ACC:FLATWNAME
FLAT_W_NAME.values = ROWS:25

FLAT_NO_NAME.exe    = :run test_acc.ini
FLAT_NO_NAME.cap    = test a flat table without a name column
FLAT_NO_NAME.values = SRC:SOURCES/flat_without_name.ini
FLAT_NO_NAME.values = ACC:FLATNONAME
FLAT_NO_NAME.values = ROWS:25

FLAT_LARGE.exe      = :run test_acc.ini
FLAT_LARGE.cap      = test a flat table with large reads
FLAT_LARGE.values   = SRC:SOURCES/flat_large_reads.ini
FLAT_LARGE.values   = ACC:FLATLARGE
FLAT_LARGE.values   = ROWS:10

DB_W_NAME.exe    = :run test_acc.ini
DB_W_NAME.cap    = test a none-cSRA DB with a name column
DB_W_NAME.values = SRC:SOURCES/db_with_name.ini
DB_W_NAME.values = ACC:DBWNAME
DB_W_NAME.values   = ROWS:10

DB_NO_NAME.exe    = :run test_acc.ini
DB_NO_NAME.cap    = test a none-cSRA DB without a name column
DB_NO_NAME.values = SRC:SOURCES/db_without_name.ini
DB_NO_NAME.values = ACC:DBNONAME
DB_NO_NAME.values   = ROWS:10

DB_LARGE.exe    = :run test_acc.ini
DB_LARGE.cap    = test a none-cSRA DB without a name column
DB_LARGE.values = SRC:SOURCES/db_large_reads.ini
DB_LARGE.values = ACC:DBLARGE

CSRA_N.exe    = :run test_acc.ini
CSRA_N.cap    = test a normal cSRA DB
CSRA_N.values = SRC:SOURCES/csra.ini
CSRA_N.values = ACC:CSRA

CSRA_CMP.exe    = :run test_acc.ini
CSRA_CMP.cap    = test a cSRA DB with a CMPREAD-anomaly
CSRA_CMP.values = SRC:SOURCES/csra_cmp.ini
CSRA_CMP.values = ACC:CSRACMP

CSRA_LARGE.exe    = :run test_acc.ini
CSRA_LARGE.cap    = test a cSRA DB with large reads
CSRA_LARGE.values = SRC:SOURCES/csra_large.ini
CSRA_LARGE.values = ACC:CSRALARGE

CSRA_RD1.exe    = :run test_acc.ini
CSRA_RD1.cap    = test a cSRA with only 1 READ per SPOT
CSRA_RD1.values = SRC:SOURCES/csra_1rd.ini
CSRA_RD1.values = ACC:CSRAONE

UNSORTED.exe = :run unsorted.ini
UNSORTED.cap = test FASTA-UNSORTED mode

INVALID.exe = :run invalid.ini
INVALID.cap = test detecting invalid accessions

CLEANUP1.exe = :cd ..

CLEANUP2.exe = :rm $WORK
CLEANUP2.ignore = yes

DONE.exe    = :echo all done ---> SUCCESS!
