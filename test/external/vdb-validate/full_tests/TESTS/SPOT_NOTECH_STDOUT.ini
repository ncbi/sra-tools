product = test

#including sra-convert
#run = REMOVE FASTQ-DUMP FASTERQ-DUMP SRA-CONVERT FASTERQ-VS-CONVERT REMOVE

#excluding sra-convert
run = REMOVE FASTQ-DUMP FASTERQ-DUMP REMOVE

REMOVE.exe    = :rm *.$EXT
REMOVE.cap    = remove all fasta-files
REMOVE.ignore = yes

SEQDEF  : '@$ac.$si/$ri [$sn ]length=$rl'
QUALDEF : '+$ac.$si/$ri [$sn ]length=$rl'

FASTQ-DUMP.exe    = fastq-dump ${FMT1A} ${FMT1B} --split-spot --skip-technical --defline-seq $SEQDEF --defline-qual $QUALDEF -Z ${ACC}
FASTQ-DUMP.cap    = fastq-dump ${FMT1A} ${FMT1B} --split-spot --skip-technical --defline-seq $SEQDEF --defline-qual $QUALDEF -Z ${ACC}
FASTQ-DUMP.stdout = A.$EXT

FASTERQ-DUMP.exe    = fasterq-dump ${ACC} ${FMT1A} --split-spot --skip-technical -Z
FASTERQ-DUMP.cap    = fasterq-dump ${ACC} ${FMT1A} --split-spot --skip-technical -Z
FASTERQ-DUMP.stdout = B.$EXT

SRA-CONVERT.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split SPOT --tech SKIP --mode STDOUT
SRA-CONVERT.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split SPOT --tech SKIP --mode STDOUT
SRA-CONVERT.stdout = C.$EXT

#fasterq-dump does not skip-technical in this mode!!!
#because of that we cannot compare against it ( FASTQ-VS-FASTERQ is missing in run= )
FASTQ-VS-FASTERQ.exe    = :diff A.$EXT B.$EXT
FASTQ-VS-FASTERQ.cap    = compare output of fastq-dump vs. fasterq-dump

FASTERQ-VS-CONVERT.exe    = :diff A.$EXT C.$EXT
FASTERQ-VS-CONVERT.cap    = compare output of fasterq-dump vs. sra-convert
