product = test

#including sra-convert
#run = REMOVE FASTQ-DUMP FASTQ-DUMP-MOVE FASTERQ-DUMP FASTERQ-DUMP-MOVE SRA-CONVERT1 SRA-CONVERT2 FASTQ-VS-FASTERQ FASTERQ-VS-CONVERT1 FASTERQ-VS-CONVERT2 REMOVE

#excluding sra-convert
run = REMOVE FASTQ-DUMP FASTQ-DUMP-MOVE FASTERQ-DUMP FASTERQ-DUMP-MOVE FASTQ-VS-FASTERQ REMOVE

DEFSEQ  : '@$ac.$si/$ri [$sn ]length=$rl'
DEFQUAL : '+$ac.$si/$ri [$sn ]length=$rl'

REMOVE.exe    = :rm *.$EXT OUTF
REMOVE.cap    = remove all $EXT-files
REMOVE.ignore = yes

FASTQ-DUMP.exe    = fastq-dump ${FMT1A} ${FMT1B} --split-spot --skip-technical --defline-seq $DEFSEQ --defline-qual $DEFQUAL ${ACC}
FASTQ-DUMP.cap    = fastq-dump ${FMT1A} ${FMT1B} --split-spot --skip-technical --defline-seq $DEFSEQ --defline-qual $DEFQUAL ${ACC}

FASTQ-DUMP-MOVE.exe   = :mv $ACC.$EXT A.$EXT
FASTQ-DUMP-MOVE.cap   = :mv $ACC.$EXT A.$EXT

FASTERQ-DUMP.exe    = fasterq-dump ${ACC} ${FMT1A} --split-spot --skip-technical
FASTERQ-DUMP.cap    = fasterq-dump ${ACC} ${FMT1A} --split-spot --skip-technical

FASTERQ-DUMP-MOVE.exe   = :mv $ACC.$EXT B.$EXT
FASTERQ-DUMP-MOVE.cap   = :mv $ACC.$EXT B.$EXT

SRA-CONVERT1.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split SPOT --tech SKIP --mode FILES
SRA-CONVERT1.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split SPOT --tech SKIP --mode FILES

SRA-CONVERT2.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split SPOT --tech SKIP --mode FILES -o out.$EXT
SRA-CONVERT2.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split SPOT --tech SKIP --mode FILES -o out.$EXT

#fasterq-dump does not skip-technical in this mode!!!
#because of that we cannot compare against it ( T6 is missing in run= )
FASTQ-VS-FASTERQ.exe    = :diff A.$EXT B.$EXT
FASTQ-VS-FASTERQ.cap    = compare output of fastq-dump vs. fasterq-dump

FASTERQ-VS-CONVERT1.exe    = :diff A.$EXT $ACC.$EXT
FASTERQ-VS-CONVERT1.cap    = compare output of fasterq-dump vs. sra-convert

FASTERQ-VS-CONVERT2.exe    = :diff A.$EXT out.$EXT
FASTERQ-VS-CONVERT2.cap    = compare output of fasterq-dump vs. sra-convert
