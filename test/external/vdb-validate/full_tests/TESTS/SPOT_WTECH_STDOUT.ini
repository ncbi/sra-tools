product = test

#including sra-convert
#run = REMOVE FASTQ-DUMP FASTERQ-DUMP SRA-CONVERT FASTQ-VS-FASTERQ FASTERQ-VS-CONVERT REMOVE

#excluding sra-convert
run = REMOVE FASTQ-DUMP FASTERQ-DUMP FASTQ-VS-FASTERQ REMOVE

REMOVE.exe    = :rm *.$EXT
REMOVE.cap    = remove all $EXT-files
REMOVE.ignore = yes

SEQDEF  : '@$ac.$si/$ri [$sn ]length=$rl'
QUALDEF : '+$ac.$si/$ri [$sn ]length=$rl'

FASTQ-DUMP.exe    = fastq-dump ${FMT1A} ${FMT1B} --split-spot --defline-seq $SEQDEF --defline-qual $QUALDEF -Z ${ACC}
FASTQ-DUMP.cap    = fastq-dump ${FMT1A} ${FMT1B} --split-spot --defline-seq $SEQDEF --defline-qual $QUALDEF -Z ${ACC}
FASTQ-DUMP.stdout = A.$EXT

FASTERQ-DUMP.exe    = fasterq-dump ${ACC} ${FMT1A} --include-technical --split-spot -Z
FASTERQ-DUMP.cap    = fasterq-dump ${ACC} ${FMT1A} --include-technical --split-spot -Z
FASTERQ-DUMP.stdout = B.$EXT

SRA-CONVERT.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split SPOT --tech INCLUDE --mode STDOUT
SRA-CONVERT.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split SPOT --tech INCLUDE --mode STDOUT
SRA-CONVERT.stdout = C.$EXT

FASTQ-VS-FASTERQ.exe    = :diff A.$EXT B.$EXT
FASTQ-VS-FASTERQ.cap    = compare output of fastq-dump vs. fasterq-dump

FASTERQ-VS-CONVERT.exe    = :diff B.$EXT C.$EXT
FASTERQ-VS-CONVERT.cap    = compare output of sra-convert vs. fasterq-dump
