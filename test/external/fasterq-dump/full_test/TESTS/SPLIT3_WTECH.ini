product = test

#including sra-convert
#run = REMOVE FASTQ-DUMP FASTERQ-DUMP FASTQ-VS-FASTERQ SRA-CONVERT-1 SRA-CONVERT-2 REMOVE

#excluding sra-convert
run = REMOVE FASTQ-DUMP FASTERQ-DUMP FASTQ-VS-FASTERQ REMOVE

FASTQ-DUMP = FASTQ-DUMP-R FASTQ-DUMP-M1 FASTQ-DUMP-M2
FASTERQ-DUMP = FASTERQ-DUMP-R FASTERQ-DUMP-M1 FASTERQ-DUMP-M2
FASTQ-VS-FASTERQ = FASTQ-VS-FASTERQ-1 FASTQ-VS-FASTERQ-2
SRA-CONVERT-1 = SRA-CONVERT-1R SRA-CONVERT-1DA SRA-CONVERT-1DB
SRA-CONVERT-2 = SRA-CONVERT-2R SRA-CONVERT-2DA SRA-CONVERT-2DB

REMOVE.exe    = :rm *.$EXT OUTF
REMOVE.cap    = remove all $EXT-files
REMOVE.ignore = yes

FASTQ-DUMP-R.exe    = fastq-dump ${FMT1A} ${FMT1B} --split-3 ${ACC}
FASTQ-DUMP-R.cap    = fastq-dump ${FMT1A} ${FMT1B} --split-3 ${ACC}

FASTQ-DUMP-M1.exe   = :mv $ACC A .$EXT _1 _2 _3 _4
FASTQ-DUMP-M1.cap   = :mv $ACC A .$EXT _1 _2 _3 _4
FASTQ-DUMP-M1.ignore = yes

#in case of an accession with a single READ per spot: there will be no _1.fast? file
FASTQ-DUMP-M2.exe   = :mv $ACC.$EXT A.$EXT
FASTQ-DUMP-M2.cap   = :mv $ACC.$EXT A.$EXT
FASTQ-DUMP-M2.ignore = yes

#this one does not work on CSRA_LARGE
FASTERQ-DUMP-R.exe    = fasterq-dump ${ACC} ${FMT1A} --split-3
FASTERQ-DUMP-R.cap    = fasterq-dump ${ACC} ${FMT1A} --split-3
FASTERQ-DUMP-R.excl   = CSRA_LARGE

FASTERQ-DUMP-M1.exe   = :mv $ACC B .$EXT _1 _2 _3 _4
FASTERQ-DUMP-M1.cap   = :mv $ACC B .$EXT _1 _2 _3 _4
FASTERQ-DUMP-M1.ignore = yes
FASTERQ-DUMP-M1.excl   = CSRA_LARGE

#in case of an accession with a single READ per spot: there will be no _1.fast? file
FASTERQ-DUMP-M2.exe   = :mv $ACC.$EXT B.$EXT
FASTERQ-DUMP-M2.cap   = :mv $ACC.$EXT B.$EXT
FASTERQ-DUMP-M2.ignore = yes

FASTQ-VS-FASTERQ-1.exe    = :diff A B .$EXT _1 _2 _3 _4
FASTQ-VS-FASTERQ-1.cap    = :diff A B .$EXT _1 _2 _3 _4
FASTQ-VS-FASTERQ-1.ignore = yes
FASTQ-VS-FASTERQ-1.excl   = CSRA_LARGE

FASTQ-VS-FASTERQ-2.exe    = :diff A.$EXT B.$EXT
FASTQ-VS-FASTERQ-2.cap    = :diff A.$EXT B.$EXT
FASTQ-VS-FASTERQ-2.ignore = yes

SRA-CONVERT-1R.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split FILES3 --tech INCLUDE --mode FILES
SRA-CONVERT-1R.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split FILES3 --tech INCLUDE --mode FILES

SRA-CONVERT-1DA.exe    = :diff A $ACC .$EXT _1 _2 _3 _4
SRA-CONVERT-1DA.cap    = :diff A $ACC .$EXT _1 _2 _3 _4
SRA-CONVERT-1DA.ignore = yes

SRA-CONVERT-1DB.exe    = :diff $ACC.$EXT A.$EXT
SRA-CONVERT-1DB.cap    = :diff $ACC.$EXT A.$EXT
SRA-CONVERT-1DB.ignore = yes

SRA-CONVERT-2R.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split FILES3 --tech INCLUDE --mode FILES -o out.$EXT
SRA-CONVERT-2R.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split FILES3 --tech INCLUDE --mode FILES -o out.$EXT

SRA-CONVERT-2DA.exe    = :diff A out .$EXT _1 _2 _3 _4
SRA-CONVERT-2DA.cap    = :diff A out .$EXT _1 _2 _3 _4
SRA-CONVERT-2DA.ignore = yes

SRA-CONVERT-2DB.exe    = :diff A.$EXT out.$EXT
SRA-CONVERT-2DB.cap    = :diff A.$EXT out.$EXT
SRA-CONVERT-2DB.ignore = yes
