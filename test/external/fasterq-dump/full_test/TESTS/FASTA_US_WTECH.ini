product = test

#including sra-convert
#run = REMOVE FASTQ-DUMP FASTQ-DUMP-MOVE FASTERQ-DUMP FASTERQ-DUMP-MOVE T4 T5 T6 T7 T8 T9 FASTQ-VS-FASTERQ T11 T12 T13 T14 T15 T16 REMOVE

#excluding sra-convert
run = REMOVE FASTQ-DUMP FASTQ-DUMP-MOVE FASTERQ-DUMP FASTERQ-DUMP-MOVE FASTQ-VS-FASTERQ REMOVE

#the values EXT | FMT | FMT1A | FMT1B are defined in the caller of this script
# ( test_this_acc.ini )

#the value ACC comes from root.ini

#the value OUT comes from the top-level ( commandline argument )

REMOVE.exe    = :rm *.$EXT OUTF
REMOVE.cap    = remove all $EXT-files
REMOVE.ignore = yes

FASTQ-DUMP.exe    = fastq-dump ${FMT1A} ${FMT1B} ${OUT}${ACC}
FASTQ-DUMP.cap    = fastq-dump ${FMT1A} ${FMT1B} ${OUT}${ACC}

FASTQ-DUMP-MOVE.exe   = :mv $ACC.$EXT A.$EXT
FASTQ-DUMP-MOVE.cap   = :mv $ACC.$EXT A.$EXT

FASTERQ-DUMP.exe    = fasterq-dump ${OUT}${ACC} ${FMT1A} --concatenate-reads
FASTERQ-DUMP.cap    = fasterq-dump ${OUT}${ACC} ${FMT1A} --concatenate-reads

FASTERQ-DUMP-MOVE.exe   = :mv $ACC.$EXT B.$EXT
FASTERQ-DUMP-MOVE.cap   = :mv $ACC.$EXT B.$EXT

T4.exe    = ${BIN}sra-convert ${OUT}${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode FILES
T4.cap    = (1) sra-convert ${OUT}${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode FILES

T5.exe    = ${BIN}sra-convert ${OUT}${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode FILES -o OUT1.$EXT
T5.cap    = (2) sra-convert ${OUT}${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode FILES -o OUT1.$EXT

T6.exe    = ${BIN}sra-convert ${OUT}${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode FILES -o OUT2
T6.cap    = (3) sra-convert ${OUT}${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode FILES -o OUT2

T7.exe    = ${BIN}sra-convert ${OUT}${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode FILES -O OUTF
T7.cap    = (4) sra-convert ${OUT}${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode FILES -O OUTF

T8.exe    = ${BIN}sra-convert ${OUT}${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode FILES -O OUTF -o OUT1.$EXT
T8.cap    = (5) sra-convert ${OUT}${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode FILES -O OUTF -o OUT1.$EXT

T9.exe    = ${BIN}sra-convert ${OUT}${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode FILES -O OUTF -o OUT2
T9.cap    = (6) sra-convert ${OUT}${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode FILES -O OUTF -o OUT2

FASTQ-VS-FASTERQ.exe    = :diff A.$EXT B.$EXT
FASTQ-VS-FASTERQ.cap    = compare output of fastq-dump vs. fasterq-dump

T11.exe    = :diff B.$EXT $ACC.$EXT
T11.cap    = compare output of fasterq-dump vs. sra-convert (1)

T12.exe    = :diff B.$EXT OUT1.$EXT
T12.cap    = compare output of fasterq-dump vs. sra-convert (2)

T13.exe    = :diff B.$EXT OUT2.$EXT
T13.cap    = compare output of fasterq-dump vs. sra-convert (3)

T14.exe    = :diff B.$EXT OUTF/$ACC.$EXT
T14.cap    = compare output of fasterq-dump vs. sra-convert (4)

T15.exe    = :diff B.$EXT OUTF/OUT1.$EXT
T15.cap    = compare output of fasterq-dump vs. sra-convert (5)

T16.exe    = :diff B.$EXT OUTF/OUT2.$EXT
T16.cap    = compare output of fasterq-dump vs. sra-convert (6)
