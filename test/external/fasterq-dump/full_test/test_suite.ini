product = test

run = CONCAT SPOT SPLIT SPLIT3

#---------------------------------------------------------------
# CONCATENATE READS
#       - FASTQ/FASTA
#       - with/without technical reads
#       - into stdout/files
CONCAT = CONCAT_WTECH_STDOUT CONCAT_NOTECH_STDOUT CONCAT_WTECH_FILE CONCAT_NOTECH_FILE

CONCAT_WTECH_STDOUT.exe  = :run TESTS/CONCAT_WTECH_STDOUT.ini
CONCAT_NOTECH_STDOUT.exe = :run TESTS/CONCAT_NOTECH_STDOUT.ini
CONCAT_WTECH_FILE.exe    = :run TESTS/CONCAT_WTECH_FILE.ini
CONCAT_NOTECH_FILE.exe   = :run TESTS/CONCAT_NOTECH_FILE.ini

#---------------------------------------------------------------
# SPLIT SPOT ( into single file )
#       - FASTQ/FASTA
#       - with/without technical reads
#       - into stdout/files
SPOT = SPOT_WTECH_STDOUT SPOT_NOTECH_STDOUT SPOT_WTECH_FILE SPOT_NOTECH_FILE

SPOT_WTECH_STDOUT.exe   = :run TESTS/SPOT_WTECH_STDOUT.ini
SPOT_NOTECH_STDOUT.exe  = :run TESTS/SPOT_NOTECH_STDOUT.ini
SPOT_WTECH_FILE.exe     = :run TESTS/SPOT_WTECH_FILE.ini
SPOT_NOTECH_FILE.exe    = :run TESTS/SPOT_NOTECH_FILE.ini

#---------------------------------------------------------------
# SPLIT FILES
#       - FASTQ/FASTA
#       - with/without technical reads
#       - into files only
SPLIT = SPLIT_WTECH SPLIT_NOTECH

SPLIT_WTECH.exe  = :run TESTS/SPLIT_WTECH.ini
SPLIT_NOTECH.exe = :run TESTS/SPLIT_NOTECH.ini

#---------------------------------------------------------------
# SPLIT3
#       - FASTQ/FASTA
#       - with/without technical reads
#       - into files only
SPLIT3 = SPLIT3_WTECH SPLIT3_NOTECH

SPLIT3_WTECH.exe  = :run TESTS/SPLIT3_WTECH.ini
SPLIT3_NOTECH.exe = :run TESTS/SPLIT3_NOTECH.ini
