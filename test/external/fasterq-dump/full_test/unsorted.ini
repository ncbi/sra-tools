product = test

run = FLAT DB CSRA

FLAT = REMOVE_FLAT CREATE_FLAT TEST_FLAT REMOVE_FLAT
DB   = REMOVE_DB CREATE_DB TEST_DB REMOVE_DB
CSRA = REMOVE_CSRA CREATE_CSRA TEST_CSRA REMOVE_CSRA

#-------------------------------------------------------------------
REMOVE_FLAT.exe = :rm FLAT_ACC *.fasta
REMOVE_FLAT.cap = remove FLAT_ACC
REMOVE_FLAT.ignore = yes

CREATE_FLAT.exe = :run ../SOURCES/flat_with_name.ini FLAT_ACC
CREATE_FLAT.cap = create FLAT_ACC with 200k spots
CREATE_FLAT.values = ROWS : 200000

TEST_FLAT.exe = :run ../TESTS/FASTA_UNSORTED.ini
TEST_FLAT.cap = testing unsorted-fasta on FLAT_ACC
TEST_FLAT.values = ACC : FLAT_ACC

#-------------------------------------------------------------------
REMOVE_DB.exe = :rm DB_ACC *.fasta
REMOVE_DB.cap = remove DB_ACC
REMOVE_DB.ignore = yes

CREATE_DB.exe = :run ../SOURCES/db_with_name.ini DB_ACC
CREATE_DB.cap = create DB_ACC with 200k spots
CREATE_DB.values = ROWS : 200000

TEST_DB.exe = :run ../TESTS/FASTA_UNSORTED.ini
TEST_DB.cap = testing unsorted-fasta on DB_ACC
TEST_DB.values = ACC : DB_ACC

#-------------------------------------------------------------------
REMOVE_CSRA.exe = :rm CSRA_ACC *.fasta
REMOVE_CSRA.cap = remove CSRA_ACC
REMOVE_CSRA.ignore = yes

CREATE_CSRA.exe = :run ../SOURCES/csra_400k.ini CSRA_ACC
CREATE_CSRA.cap = create CSRA_ACC with 400k reads

TEST_CSRA.exe = :run ../TESTS/FASTA_UNSORTED.ini
TEST_CSRA.cap = testing unsorted-fasta on CSRA_ACC
TEST_CSRA.values = ACC : CSRA_ACC
