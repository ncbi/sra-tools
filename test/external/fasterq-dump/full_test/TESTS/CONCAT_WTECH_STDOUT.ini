product = test

#including sra-convert
#run = REMOVE FASTQ-DUMP FASTERQ-DUMP SRA-CONVERT FASTQ-VS-FASTERQ CONVERT-VS-FASTERQ REMOVE

#excluding sra-convert
run = REMOVE FASTQ-DUMP FASTERQ-DUMP FASTQ-VS-FASTERQ REMOVE

REMOVE.exe    = :rm *.$EXT
REMOVE.cap    = remove all $EXT-files
REMOVE.ignore = yes

FASTQ-DUMP.exe    = fastq-dump ${FMT1A} ${FMT1B} -Z ${ACC}
FASTQ-DUMP.cap    = fastq-dump ${FMT1A} ${FMT1B} -Z ${ACC}
FASTQ-DUMP.stdout = A.$EXT

#this does not work on CSRA_LARGE.FASTQ
FASTERQ-DUMP.exe    = fasterq-dump ${ACC} ${FMT1A} --concatenate-reads -Z
FASTERQ-DUMP.cap    = fasterq-dump ${ACC} ${FMT1A} --concatenate-reads -Z
FASTERQ-DUMP.stdout = B.$EXT
FASTERQ-DUMP.excl   = CSRA_LARGE.FASTQ

SRA-CONVERT.exe    = ${BIN}sra-convert ${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode STDOUT
SRA-CONVERT.cap    = ${BIN}sra-convert ${ACC} --format $FMT --split CONCAT --tech INCLUDE --mode STDOUT
SRA-CONVERT.stdout = C.$EXT

FASTQ-VS-FASTERQ.exe    = :diff A.$EXT B.$EXT
FASTQ-VS-FASTERQ.cap    = compare output of fastq-dump vs. fasterq-dump
FASTQ-VS-FASTERQ.excl   = CSRA_LARGE.FASTQ

CONVERT-VS-FASTERQ.exe    = :diff A.$EXT C.$EXT
CONVERT-VS-FASTERQ.cap    = compare output of sra-convert vs. fasterq-dump
